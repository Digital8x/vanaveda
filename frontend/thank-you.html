<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You | Codename Green Gold Nerul</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      background-color: var(--bg-dark);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }
    .thank-you-container {
      background: rgba(255, 255, 255, 0.05);
      padding: 50px;
      border-radius: 15px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(212, 175, 55, 0.3);
      max-width: 600px;
    }
    h1 {
      color: var(--gold);
      font-size: 48px;
      margin-bottom: 20px;
    }
    p {
      font-size: 18px;
      margin-bottom: 30px;
      color: #ccc;
    }
    .btn-home {
      display: inline-block;
      padding: 12px 30px;
      background: var(--gold);
      color: var(--green-dark);
      font-weight: 600;
      border-radius: 5px;
      transition: all 0.3s ease;
    }
    .btn-home:hover {
      background: var(--gold-light);
      transform: translateY(-2px);
    }
  </style>
</head>
<body>

  <div class="thank-you-container reveal">
    <img src="../images/logo.png" alt="Sai Developers" style="height: 60px; margin-bottom: 30px;">
    <h1>Thank You!</h1>
    <p>Your details have been successfully submitted. Our luxury property expert will contact you shortly to provide more information about Codename Green Gold Nerul.</p>
    <a href="/" class="btn-home">Return to Homepage</a>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
